apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homer-pvc
  namespace: apps
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homer
  template:
    metadata:
      labels:
        app: homer
    spec:
      containers:
        - name: homer
          image: b4bz/homer:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: homer-data
              mountPath: /www/assets
      volumes:
        - name: homer-data
          persistentVolumeClaim:
            claimName: homer-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: homer
  namespace: apps
spec:
  selector:
    app: homer
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homer
  namespace: apps
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: homer.lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homer
                port:
                  number: 80
