apiVersion: v1
kind: Namespace
metadata:
  name: woodpecker
---
apiVersion: v1
kind: Secret
metadata:
  name: woodpecker-secret
  namespace: woodpecker
type: Opaque
stringData:
  agent-secret: "woodpecker-agent-secret-lab"
  gitea-client: "36418f6a-5a8d-4532-852d-4962fa569923"
  gitea-secret: "gto_b3mrr7vbmvwsvh5yxdk3dq7i5mgflmqtgn6fpaiqum2nkprs57lq"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: woodpecker-server
  namespace: woodpecker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: woodpecker-server
  template:
    metadata:
      labels:
        app: woodpecker-server
    spec:
      containers:
        - name: woodpecker-server
          image: woodpeckerci/woodpecker-server:latest
          ports:
            - containerPort: 8000
            - containerPort: 9000
          env:
            - name: WOODPECKER_OPEN
              value: "false"
            - name: WOODPECKER_HOST
              value: "http://woodpecker.lab.local"
            - name: WOODPECKER_GITEA
              value: "true"
            - name: WOODPECKER_GITEA_URL
              value: "http://gitea.lab.local"
            - name: WOODPECKER_GITEA_CLIENT
              valueFrom:
                secretKeyRef:
                  name: woodpecker-secret
                  key: gitea-client
            - name: WOODPECKER_GITEA_SECRET
              valueFrom:
                secretKeyRef:
                  name: woodpecker-secret
                  key: gitea-secret
            - name: WOODPECKER_AGENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: woodpecker-secret
                  key: agent-secret
            - name: WOODPECKER_DATABASE_DRIVER
              value: "sqlite3"
            - name: WOODPECKER_DATABASE_DATASOURCE
              value: "/var/lib/woodpecker/woodpecker.sqlite"
          volumeMounts:
            - name: data
              mountPath: /var/lib/woodpecker
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: woodpecker-server
  namespace: woodpecker
spec:
  selector:
    app: woodpecker-server
  ports:
    - name: http
      port: 80
      targetPort: 8000
    - name: grpc
      port: 9000
      targetPort: 9000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: woodpecker
  namespace: woodpecker
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: woodpecker.lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: woodpecker-server
                port:
                  number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: woodpecker-agent
  namespace: woodpecker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: woodpecker-agent
  template:
    metadata:
      labels:
        app: woodpecker-agent
    spec:
      containers:
        - name: woodpecker-agent
          image: woodpeckerci/woodpecker-agent:latest
          env:
            - name: WOODPECKER_SERVER
              value: "woodpecker-server:9000"
            - name: WOODPECKER_AGENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: woodpecker-secret
                  key: agent-secret
            - name: WOODPECKER_BACKEND
              value: "kubernetes"
            - name: WOODPECKER_BACKEND_K8S_NAMESPACE
              value: "woodpecker"
            - name: WOODPECKER_BACKEND_K8S_STORAGE_CLASS
              value: "nfs"
